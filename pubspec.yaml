name: bds_commerce_mobile
description: BDS Commerce Flutter starter app for Client Portal and Store Admin mode.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  intl: ^0.19.0
  url_launcher: ^6.3.1
  image_picker: 1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/


